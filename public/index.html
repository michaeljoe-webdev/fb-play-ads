<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- SEO / FB Ads meta — FB crawler reads these, NOT the JS redirect -->
  <title>Yumri POS — Download on Google Play</title>
  <meta name="description" content="Download Yumri POS on Google Play. The smart point-of-sale app for your business." />

  <!-- Open Graph tags — point to THIS landing page, not Play Store -->
  <meta property="og:title" content="Yumri POS — Download on Google Play" />
  <meta property="og:description" content="Download Yumri POS on Google Play. The smart point-of-sale app for your business." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yumri-tech.vercel.app/" />
  <meta property="og:image" content="https://play-lh.googleusercontent.com/default-app-icon" />

  <!-- Canonical points to this landing page -->
  <link rel="canonical" href="https://yumri-tech.vercel.app/" />

  <!-- JS redirect after 2s — bots don't execute JS, so FB crawler stays on this page -->
  <script>
    setTimeout(function() {
      window.location.replace("https://play.google.com/store/apps/details?id=com.yumri.pos");
    }, 2000);
  </script>

  <!-- meta refresh fallback with 3s delay -->
  <meta http-equiv="refresh" content="3; url=https://play.google.com/store/apps/details?id=com.yumri.pos" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #f0ede8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 32px; }
    .logo {
      width: 72px; height: 72px;
      border-radius: 18px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(52,199,89,0.3);
      display: block;
      object-fit: contain;
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    p { color: #6b6b80; font-size: 0.9rem; margin-bottom: 24px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #34c759;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .manual-link {
      display: inline-block;
      margin-top: 12px;
      color: #34c759;
      font-size: 0.82rem;
      text-decoration: none;
    }
    .manual-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="applogo.png" alt="Yumri POS" />
    <h1>Yumri POS</h1>
    <p>Redirecting you to Google Play…</p>
    <div class="spinner"></div>
    <br>
    <a class="manual-link" href="https://play.google.com/store/apps/details?id=com.yumri.pos">
      Tap here if you are not redirected
    </a>
  </div>
</body>
</html>
